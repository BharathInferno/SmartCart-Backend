spring.application.name=shopper

#spring.ai.vertex.ai.project-id=gcp-abs-zz853-3c-sbx-prj-01
#spring.ai.vertex.ai.location=us-central1
#spring.ai.vertex.ai.chat.model=gemini-1.5-pro


# OpenAI API key (recommended via environment variable)
#spring.ai.openai.api-key=${GOOGLE_APPLICATION_CREDENTIALS}

# Chat model configuration
#spring.ai.openai.chat.options.model=gpt-5-mini
#spring.ai.openai.chat.options.temperature=0.2
#spring.ai.openai.chat.options.max-tokens=512
server.port=9191
spring.profiles.active=dev


# PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/shopper_db
spring.datasource.username=shopper_user
spring.datasource.password=shopper_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# SQL initialization
spring.sql.init.mode=always

# Optional logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# JWT
app.jwt.secret=SmartCartSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2026
app.jwt.expiration-ms=86400000

