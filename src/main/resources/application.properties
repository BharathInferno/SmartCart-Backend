spring.application.name=shopper
server.port=9191


# PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/shopper_db
spring.datasource.username=shopper_user
spring.datasource.password=shopper_pass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

# SQL initialization
spring.sql.init.mode=always

# Optional logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# JWT
app.jwt.secret=SmartCartSecretKeyForJWTTokenGenerationMustBeAtLeast256BitsLong2026
app.jwt.expiration-ms=86400000

# SmartCart AI Service
smartcart.ai.base-url=http://localhost:8000

